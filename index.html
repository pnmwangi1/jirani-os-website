    <title>Jirani OS — The operating system for your business</title>
    <meta name="description" content="Jirani OS unifies property management, sales, billing, inventory and accounting into one system — built for businesses that outgrew spreadsheets and disconnected apps." />

    <!-- Open Graph -->

    <meta property="og:description" content="One system for property management, sales, billing, inventory and accounting — replacing the spreadsheets and disconnected apps most growing businesses juggle today." />

    <meta property="og:url" content="https://jiranios.com/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jirani OS — The operating system for your business" />

    <meta name="twitter:image" content="/og-image.png" />

    <script>
      // Item: matches the redirect from public/404.html for GitHub
      // Pages deployments — restores the real path before React Router
      // mounts. No-op on Cloudflare Pages, since _redirects means this
      // query param is never present there.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('redirect');
        if (redirect) {
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
    <script>
      // Item: applied before paint to avoid a flash of the wrong theme —
      // reads the same localStorage key the in-app ThemeToggle will use,
      // so this logic transfers directly when this becomes the real app shell.
      (function () {
        try {
          var stored = localStorage.getItem('jirani-theme');
          var mode = stored || 'system';
          var isDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
